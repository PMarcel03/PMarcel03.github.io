name: Update Pinned Repos

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  update-pinned:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pinned repos
        run: |
          curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: bearer ${{ secrets.GH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "{ user(login: \"PMarcel03\") { pinnedItems(first: 6, types: REPOSITORY) { nodes { ... on Repository { name description url primaryLanguage { name } } } } } }"}' \
            | jq '.data.user.pinnedItems.nodes' > pinned.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pinned.json
          git diff --cached --quiet || git commit -m "Update pinned repos"
          git push
